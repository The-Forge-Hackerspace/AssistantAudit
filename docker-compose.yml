version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assistantaudit-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frameworks:/app/frameworks
      - db_data:/app/backend/instance
      - uploads_data:/app/backend/uploads
    environment:
      - ENV=development
      - DEBUG=true
      - SECRET_KEY=${SECRET_KEY:-dev-only-insecure-key-change-me}
      - DATABASE_URL=sqlite:///./instance/assistantaudit.db
      - FRAMEWORKS_DIR=/app/frameworks
      - LOG_LEVEL=DEBUG
    restart: unless-stopped

  # Décommenter pour PostgreSQL en production
  # db:
  #   image: postgres:16-alpine
  #   container_name: assistantaudit-db
  #   environment:
  #     POSTGRES_DB: assistantaudit
  #     POSTGRES_USER: assistantaudit
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  db_data:
  uploads_data:
