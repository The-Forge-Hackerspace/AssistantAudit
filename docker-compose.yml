services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: assistantaudit
      POSTGRES_USER: assistantaudit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis (definir dans .env)}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Pas d'exposition sur l'hote : la DB est accessible uniquement via le
    # reseau interne Docker (service "backend"). Pour debug local, decommenter :
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistantaudit"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: postgresql://assistantaudit:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis (definir dans .env)}@db:5432/assistantaudit
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      CA_CERT_PATH: /app/certs/ca.pem
      CA_KEY_PATH: /app/certs/ca.key
      DATA_DIR: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://frontend:3000"]}
      MONKEY365_PATH: /app/tools/monkey365/Invoke-Monkey365.ps1
      DEMO: ${DEMO:-false}
      # Restreindre aux IPs du reverse proxy en prod (NPMPlus). '*' par defaut
      # car le port 8000 du backend n'est pas publie via le proxy.
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      # Seuils du rate-limiter in-memory (defaults backend : 5/30/100 par minute).
      # Surchargeables via .env pour relacher en E2E (ex. 10000) ou durcir en prod.
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-5}
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-30}
      RATE_LIMIT_PUBLIC_MAX: ${RATE_LIMIT_PUBLIC_MAX:-100}
    volumes:
      - ./data:/app/data
      - app-certs:/app/certs
      - ./tools/monkey365:/app/tools/monkey365
      - ./frameworks:/app/frameworks
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # /api/v1 (relatif) : le bundle tape la meme origine, Next.js proxie
        # /api/* vers BACKEND_INTERNAL_URL via la rewrite next.config.ts.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        # rewrites() Next.js est evaluee au BUILD : l'URL doit etre dispo ici.
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  pgdata:
  app-certs:
