# =============================================================================
# Scan de secrets — AssistantAudit
# Détecte les secrets exposés dans le code via trufflehog.
# Déclenché sur pull_request et push vers main.
# =============================================================================

name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Scan secrets — Analyse du diff git avec trufflehog
  # Bloque le merge si des secrets vérifiés ou inconnus sont détectés.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Scan secrets (trufflehog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Récupérer le code source (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scanner les secrets avec trufflehog
        uses: trufflesecurity/trufflehog@6bd2d14f7a4bc1e569fa3550efa7ec632a4fa67b # v3.94.2
        with:
          extra_args: --results=verified,unknown
