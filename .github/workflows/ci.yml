# =============================================================================
# CI Pipeline — AssistantAudit
# Déclenché sur push et pull_request vers main et branches feature.
# Les fichiers documentation (.md, docs/) sont exclus des jobs test/build/deploy
# via dorny/paths-filter, tandis que le job lint s'exécute toujours (AC2).
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect Changes — Détermine quels chemins ont été modifiés
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'backend/**'
              - 'frontend/**'
              - 'frameworks/**'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # Lint — Vérification qualité du code (backend + frontend)
  # Toujours exécuté, même pour les changements docs-only (AC2).
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install ruff
        run: pip install ruff

      - name: Backend lint (ruff)
        run: ruff check backend/ --output-format=github

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend lint (eslint)
        run: cd frontend && npx eslint .

  # ---------------------------------------------------------------------------
  # Test — Tests unitaires et d'intégration
  # Exécuté uniquement si du code source a changé.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    needs: [lint, detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
      SECRET_KEY: ci-test-secret-key
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances backend
        run: pip install -r requirements.txt

      - name: Exécuter les tests backend avec couverture
        run: pytest -q --tb=short --cov=app --cov-report=xml

      - name: Uploader le rapport de couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ---------------------------------------------------------------------------
  # Build — Construction des artefacts (Docker image)
  # Exécuté uniquement si du code source a changé.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer les tags et labels OCI
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image Docker (sans push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — Déploiement (uniquement sur main avec changements code)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: [build, detect-changes]
    if: >-
      needs.detect-changes.outputs.code == 'true'
      && github.ref == 'refs/heads/main'
      && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer les tags et labels OCI
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build et push image Docker vers ghcr.io
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vérifier le digest de l'image pushée
        run: echo "Image pushée avec digest ${{ steps.push.outputs.digest }}"
