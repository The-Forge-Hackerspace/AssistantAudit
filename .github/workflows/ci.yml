# =============================================================================
# CI Pipeline — AssistantAudit
# Déclenché sur push et pull_request vers main et branches feature.
# Les fichiers documentation (.md, docs/) sont exclus des jobs test/build/deploy
# via dorny/paths-filter, tandis que le job lint s'exécute toujours (AC2).
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect Changes — Détermine quels chemins ont été modifiés
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'backend/**'
              - 'frontend/**'
              - 'frameworks/**'
              - '!docs/**'
              - '!**/*.md'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # Lint — Vérification qualité du code (backend + frontend)
  # Toujours exécuté, même pour les changements docs-only (AC2).
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies (including ruff)
        run: pip install -r backend/requirements.txt

      - name: Backend lint (ruff)
        run: ruff check backend/ --output-format=github

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend lint (eslint)
        run: cd frontend && npx eslint .

  # ---------------------------------------------------------------------------
  # Test — Tests unitaires et d'intégration
  # Exécuté uniquement si du code source a changé.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.db }})
    needs: [lint, detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: assistantaudit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
      SECRET_KEY: ci-test-secret-key
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances backend
        run: pip install -r requirements.txt

      - name: Configurer DATABASE_URL pour PostgreSQL
        if: matrix.db == 'postgres'
        run: echo "DATABASE_URL=postgresql://test:test@localhost:5432/assistantaudit_test" >> "$GITHUB_ENV"

      - name: Exécuter les tests backend avec couverture
        run: pytest tests/ -q --tb=short --cov=app --cov-report=xml

      - name: Uploader le rapport de couverture
        if: always() && matrix.db == 'sqlite'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ---------------------------------------------------------------------------
  # Build — Construction et push de l'image Docker vers ghcr.io
  # Pousse toujours le tag SHA ; ajoute 'latest' uniquement sur main.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Générer les tags et labels OCI
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image Docker (sans push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ---------------------------------------------------------------------------
  # Scan — Analyse de vulnérabilités avec Trivy
  # Scanne l'image Docker construite ; bloque le pipeline sur CRITICAL.
  # ---------------------------------------------------------------------------
  scan:
    name: Security Scan
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construire l'image pour le scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: scan-target:latest
          cache-from: type=gha

      - name: Scan de vulnérabilités Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: scan-target:latest
          scan-type: image
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          output: trivy-results.txt

      - name: Afficher le rapport Trivy
        if: always()
        run: |
          echo "===== Rapport Trivy ====="
          sed -n '1,200p' trivy-results.txt || true

      - name: Uploader le rapport Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.txt
  # ---------------------------------------------------------------------------
  # Deploy — Déploiement (uniquement sur main avec changements code)
  # Réutilise l'image construite par le job build (pas de rebuild).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: [build, scan, detect-changes]
    if: >-
      needs.detect-changes.outputs.code == 'true'
      && github.ref == 'refs/heads/main'
      && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer les tags et labels OCI
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build et push image Docker
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image disponible pour déploiement
        run: |
          echo "Image tags: ${{ steps.meta.outputs.tags }}"
          echo "Image digest: ${{ steps.push.outputs.digest }}"
          echo "Prêt pour déploiement — ajouter les étapes de déploiement ici."
