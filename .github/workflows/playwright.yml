name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install root dependencies (Playwright)
      run: npm ci
    - name: Install frontend dependencies
      run: npm --prefix frontend ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Start stack (Docker Compose)
      run: docker compose up -d --build db backend frontend
      env:
        ENV: testing
        POSTGRES_PASSWORD: changeme

    - name: Wait for backend health
      run: |
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
            echo "Backend is up"
            exit 0
          fi
          echo "Waiting for backend... ($i/60)"
          sleep 2
        done
        echo "Backend failed to start"
        docker compose ps
        docker compose logs --no-color --tail=200
        exit 1

    - name: Wait for frontend
      run: |
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:3000/ > /dev/null 2>&1; then
            echo "Frontend is up"
            exit 0
          fi
          echo "Waiting for frontend... ($i/60)"
          sleep 2
        done
        echo "Frontend failed to start"
        docker compose ps
        docker compose logs frontend --no-color --tail=200
        exit 1

    - name: Seed admin user for E2E tests
      run: |
        docker compose exec -T \
          -e ADMIN_EMAIL=admin@assistantaudit.local \
          -e ADMIN_PASSWORD=Admin1234! \
          backend python /app/backend/init_db.py

    - name: Verify admin login works
      run: |
        set -e
        for i in $(seq 1 30); do
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://127.0.0.1:8000/api/v1/auth/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "username=admin@assistantaudit.local" \
            --data-urlencode "password=Admin1234!")
          if [ "$code" = "200" ]; then
            echo "Admin auth OK"
            exit 0
          fi
          echo "Waiting for admin auth (got $code) ($i/30)"
          sleep 2
        done
        echo "Admin auth never became ready"
        docker compose logs backend --no-color --tail=200
        exit 1

    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
