# Alembic configuration for AssistantAudit

[alembic]
script_location = alembic
# Surchargé par alembic/env.py via app.core.config.Settings.DATABASE_URL
# Utiliser la variable d'environnement DATABASE_URL pour changer de backend.
sqlalchemy.url = sqlite:///./instance/assistantaudit.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
